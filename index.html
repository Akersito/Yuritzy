<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Yuritzy</title>
  <style>
    body {
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Georgia', serif;
    }

    #flipbook {
      width: 800px;
      height: 500px;
    }

    .page {
      width: 400px;
      height: 500px;
      background: white;
      border: 1px solid #ccc;
      padding: 30px;
      box-sizing: border-box;
      font-size: 20px;
      line-height: 1.6;
    }

    h1, h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div id="flipbook">
    <div class="page">
      <h1>Hola Yuritzy</h1>
      <p>Desde que te conocí, todo en mi vida cambió para mejor...</p>
    </div>
    <div class="page">
      <h2>¿Sabes algo?</h2>
      <p>No dejo de pensar en ti, en todo lo bonito que hemos compartido.</p>
    </div>
    <div class="page">
      <h2>Eres especial</h2>
      <p>Tu risa, tu voz, tu forma de ver la vida... me encantas.</p>
    </div>
    <div class="page">
      <h2>Yuritzy...</h2>
      <p>¿Quieres ser mi novia?</p>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/lib/turn.min.js"></script>
  <script>
    $(document).ready(function () {
      $("#flipbook").turn({
        width: 800,
        height: 500,
        autoCenter: true,
        elevation: 50,
        gradients: true,
        duration: 1000
      });
    });
  </script>
</body>
</html>
